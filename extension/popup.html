<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>B站本地屏蔽</title>
  <style>
    :root {
      color-scheme: light;
      --text: #18191c;
      --muted: #61666d;
      --border: #d0d7de;
      --primary: #00a1d6;
      --bg: #f6f8fa;
      --panel: #fff;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 420px;
      min-width: 420px;
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: 420px;
      max-height: 620px;
      overflow: auto;
      padding: 14px;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      white-space: nowrap;
    }
    .switch {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-weight: 650;
      white-space: nowrap;
    }
    .rule-card {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel);
    }
    .rule-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 8px;
    }
    label {
      font-weight: 700;
    }
    .count {
      min-width: 28px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef6fb;
      color: #0077a8;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
    }
    .add-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }
    input[type="text"] {
      width: 100%;
      min-width: 0;
      height: 34px;
      padding: 0 9px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      background: #fff;
      font: inherit;
    }
    button {
      min-height: 34px;
      padding: 0 11px;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      background: #fff;
      cursor: pointer;
      font: inherit;
      white-space: nowrap;
    }
    button.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      font-weight: 650;
    }
    .rule-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      min-height: 38px;
      max-height: 92px;
      overflow: auto;
      margin-top: 9px;
      padding: 8px;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: #fafafa;
    }
    .rule-item {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      min-height: 28px;
      border: 1px solid #d0d7de;
      border-radius: 999px;
      background: #fff;
      overflow: hidden;
    }
    .rule-text {
      min-width: 0;
      max-width: 250px;
      padding: 0 8px 0 10px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .remove-rule {
      width: 28px;
      height: 28px;
      min-height: 28px;
      padding: 0;
      border: 0;
      border-left: 1px solid #e5e7eb;
      border-radius: 0;
      color: #61666d;
      background: #fff;
      font-size: 17px;
      line-height: 1;
    }
    .empty {
      color: var(--muted);
      font-size: 12px;
      align-self: center;
    }
    .actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-top: 12px;
    }
    .status {
      min-height: 20px;
      color: #00875a;
      font-size: 12px;
      font-weight: 650;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>B站本地屏蔽</h1>
      <label class="switch">
        <input id="enabled" type="checkbox">
        启用
      </label>
    </header>

    <section class="rule-card" data-category="uids">
      <div class="rule-head">
        <label for="input-uids">本地拉黑 UID</label>
        <span class="count" id="count-uids">0</span>
      </div>
      <div class="add-row">
        <input id="input-uids" type="text" inputmode="numeric" spellcheck="false" placeholder="输入 UID">
        <button type="button" data-add="uids">添加</button>
      </div>
      <div class="rule-list" id="list-uids"></div>
    </section>

    <section class="rule-card" data-category="names">
      <div class="rule-head">
        <label for="input-names">用户名关键词</label>
        <span class="count" id="count-names">0</span>
      </div>
      <div class="add-row">
        <input id="input-names" type="text" spellcheck="false" placeholder="输入用户名关键词">
        <button type="button" data-add="names">添加</button>
      </div>
      <div class="rule-list" id="list-names"></div>
    </section>

    <section class="rule-card" data-category="titleKeywords">
      <div class="rule-head">
        <label for="input-titleKeywords">视频标题关键词</label>
        <span class="count" id="count-titleKeywords">0</span>
      </div>
      <div class="add-row">
        <input id="input-titleKeywords" type="text" spellcheck="false" placeholder="输入标题关键词">
        <button type="button" data-add="titleKeywords">添加</button>
      </div>
      <div class="rule-list" id="list-titleKeywords"></div>
    </section>

    <section class="rule-card" data-category="commentKeywords">
      <div class="rule-head">
        <label for="input-commentKeywords">评论关键词</label>
        <span class="count" id="count-commentKeywords">0</span>
      </div>
      <div class="add-row">
        <input id="input-commentKeywords" type="text" spellcheck="false" placeholder="输入评论关键词">
        <button type="button" data-add="commentKeywords">添加</button>
      </div>
      <div class="rule-list" id="list-commentKeywords"></div>
    </section>

    <div class="actions">
      <button class="primary" id="openOptions" type="button">完整管理页</button>
      <div class="status" id="status"></div>
    </div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
